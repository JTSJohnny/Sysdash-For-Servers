{% extends "base.html" %}

{% block title %}Add App - SysDash{% endblock %}

{% block content %}
<article>
  <h2>Add New App</h2>
  <form action="/add_app" method="post">
    <label for="name">App Display Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="sv_name">Systemd Service Name:</label>
    <input type="text" id="sv_name" name="sv_name" required>

    <label for="filepath">Filepath:</label>
    <input type="text" id="filepath" name="filepath" required>

    <label for="port">Port:</label>
    <input type="number" id="port" name="port" required>

    <label for="domain">Domain:</label>
    <input type="text" id="domain" name="domain" required>

    <label for="start_cmd">Start Command:</label>
    <input type="text" id="start_cmd" name="start_cmd" required>

    <button type="submit">Add App</button>
  </form>
</article>
{% endblock %}
